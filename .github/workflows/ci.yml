name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Validate, test and package
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fai_crm_test?schema=public
      AUTH_SECRET: ci-only-secret-change-me
      AUTH_COOKIE_NAME: fai_crm_session
      NEXT_TELEMETRY_DISABLED: "1"
      AI_PROVIDER: mock
      AI_ORCHESTRATOR_WORKER_ENABLED: "0"
      AI_EXTERNAL_PROVIDERS_ENABLED: "false"
      AI_ALLOWED_MODELS: ""
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fai_crm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d fai_crm_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify production dependency audit boundary
        run: |
          npm audit --omit=dev --json > "$RUNNER_TEMP/npm-audit.json" || true
          node - "$RUNNER_TEMP/npm-audit.json" <<'NODE'
          const fs = require('node:fs');
          const report = JSON.parse(fs.readFileSync(process.argv[2], 'utf8'));
          const counts = report.metadata?.vulnerabilities;
          const vulnerabilities = report.vulnerabilities;
          if (!counts || !vulnerabilities || report.auditReportVersion !== 2) process.exit(1);
          const allowedPackages = new Set(['next', 'postcss', 'sharp']);
          const allowedSources = new Set([1117015, 1124066]);
          for (const [name, vulnerability] of Object.entries(vulnerabilities)) {
            if (!allowedPackages.has(name)) process.exit(1);
            for (const via of vulnerability.via) {
              if (typeof via === 'string') {
                if (!allowedPackages.has(via)) process.exit(1);
              } else if (!allowedSources.has(via.source)) {
                process.exit(1);
              }
            }
          }
          if (
            counts.critical !== 0
            || counts.high > 2
            || counts.moderate > 1
            || counts.low !== 0
            || counts.info !== 0
            || counts.total > 3
          ) process.exit(1);
          NODE

      - name: Verify patch and shell syntax
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git diff --check
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --check "$BASE_SHA"...HEAD
          fi
          bash -n scripts/smoke-docker-prod.sh

      - name: Verify PR82 has no schema or migration delta
        if: github.event_name == 'pull_request' && github.head_ref == 'codex/ai-orchestrator-admission-claim-lease-wiring-v1'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          migration_count="$(find prisma/migrations -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d ' ')"
          test "$migration_count" = "29"
          if git diff --name-only "$BASE_SHA"...HEAD -- prisma/schema.prisma prisma/migrations | grep -q .; then
            echo "PR82 must not change prisma/schema.prisma or prisma/migrations" >&2
            exit 1
          fi

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Apply database migrations
        run: npm run prisma:migrate:deploy

      - name: Verify production seed idempotency
        run: |
          APP_ENV=production npm run prisma:seed:production
          APP_ENV=production npm run prisma:seed:production

      - name: Verify DB tests skip without DATABASE_URL
        run: env -u DATABASE_URL npm run test:db

      - name: Run PostgreSQL permission tests
        run: RUN_DB_TESTS=1 AI_ORCHESTRATOR_DB_TESTS_CONFIRMED=1 npm run test:db

      - name: TypeScript typecheck
        run: npx tsc --noEmit --incremental false

      - name: Build
        run: npm run build

      - name: Verify systemd unit examples
        run: |
          if command -v systemd-analyze >/dev/null 2>&1; then
            root="$(mktemp -d)"
            mkdir -p "$root/etc/systemd/system" "$root/usr/bin"
            cp deploy/systemd/fai-crm-ai-reconcile.service.example "$root/etc/systemd/system/fai-crm-ai-reconcile.service"
            cp deploy/systemd/fai-crm-ai-reconcile.timer.example "$root/etc/systemd/system/fai-crm-ai-reconcile.timer"
            for unit in network-online.target sysinit.target timers.target; do
              printf '[Unit]\nDescription=Dummy %%s for verify\n' "$unit" > "$root/etc/systemd/system/$unit"
            done
            printf '[Unit]\nDescription=Dummy docker.service for verify\n[Service]\nExecStart=/usr/bin/true\n' > "$root/etc/systemd/system/docker.service"
            : > "$root/usr/bin/docker"
            chmod +x "$root/usr/bin/docker"
            systemd-analyze verify --root="$root" fai-crm-ai-reconcile.service fai-crm-ai-reconcile.timer
            rm -rf "$root"
          else
            echo "systemd-analyze not available; skipping unit verification"
          fi

      - name: Docker production application and worker packaging smoke test
        run: COMPOSE_PROJECT_NAME=fai-crm-smoke-${{ github.run_id }}-${{ github.run_attempt }} ./scripts/smoke-docker-prod.sh
