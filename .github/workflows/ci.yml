name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate:
    name: Install, Prisma generate and build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fai_crm_test?schema=public
      AUTH_SECRET: ci-only-secret-change-me
      AUTH_COOKIE_NAME: fai_crm_session
      AI_PROVIDER: mock
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fai_crm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d fai_crm_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply database migrations
        run: npm run prisma:migrate:deploy

      - name: Verify production seed idempotency
        run: |
          APP_ENV=production npm run prisma:seed:production
          APP_ENV=production npm run prisma:seed:production

      - name: Verify DB tests skip without DATABASE_URL
        run: env -u DATABASE_URL npm run test:db

      - name: Run PostgreSQL permission tests
        run: RUN_DB_TESTS=1 AI_ORCHESTRATOR_DB_TESTS_CONFIRMED=1 npm run test:db

      - name: Build
        run: npm run build


      - name: Verify systemd unit examples
        run: |
          if command -v systemd-analyze >/dev/null 2>&1; then
            root="$(mktemp -d)"
            mkdir -p "$root/etc/systemd/system" "$root/usr/bin"
            cp deploy/systemd/fai-crm-ai-reconcile.service.example "$root/etc/systemd/system/fai-crm-ai-reconcile.service"
            cp deploy/systemd/fai-crm-ai-reconcile.timer.example "$root/etc/systemd/system/fai-crm-ai-reconcile.timer"
            for unit in network-online.target sysinit.target timers.target; do
              printf '[Unit]\nDescription=Dummy %%s for verify\n' "$unit" > "$root/etc/systemd/system/$unit"
            done
            printf '[Unit]\nDescription=Dummy docker.service for verify\n[Service]\nExecStart=/usr/bin/true\n' > "$root/etc/systemd/system/docker.service"
            : > "$root/usr/bin/docker"
            chmod +x "$root/usr/bin/docker"
            systemd-analyze verify --root="$root" fai-crm-ai-reconcile.service fai-crm-ai-reconcile.timer
            rm -rf "$root"
          else
            echo "systemd-analyze not available; skipping unit verification"
          fi

      - name: Docker production reconciler smoke test
        run: COMPOSE_PROJECT_NAME=fai-crm-smoke-${{ github.run_id }}-${{ github.run_attempt }} ./scripts/smoke-docker-prod.sh
